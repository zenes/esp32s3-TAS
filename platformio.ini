; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = lilygo-lcd1
src_dir = examples/tas

[env]
platform = espressif32@6.5.0
framework = arduino
upload_speed = 460800
monitor_speed = 115200
monitor_filters = 
	default
	esp32_exception_decoder
build_flags = 
	-DCORE_DEBUG_LEVEL=1
	-I include
	-include esp32_fix.h
	-DARDUINO_USB_CDC_ON_BOOT=0
build_unflags =
	-DARDUINO_USB_CDC_ON_BOOT
board_build.partitions = huge_app.csv

# ============================================================
#  보드 기본 사양 정의 (Board Definitions)
# ============================================================
[board_lilygo]
board = esp32s3box
build_flags = 
	-DLILYGO_T_ETH_LITE_ESP32S3
	-DBOARD_HAS_PSRAM
board_build.arduino.memory_type = qio_opi
board_build.f_flash = 80000000
board_build.flash_mode = qio
board_build.f_cpu = 240000000
board_build.variants_dir = custom_variants
lib_deps = 
	marian-craciunescu/ESP32Ping@^1.7.0
	lvgl/lvgl@^8.3.9
	TAMC_GT911 @ ^1.0.2

[board_evb]
board = esp32s3box
build_flags = 
	-DESP32_S3_LCD_EV_BOARD_2
	-DBOARD_HAS_PSRAM
	-DSDKCONFIG_AUDIO_ENABLED=0
board_build.arduino.memory_type = qio_opi
board_build.f_flash = 80000000
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.variants_dir = custom_variants
board_build.variant = esp32s3box
lib_deps = 
	marian-craciunescu/ESP32Ping@^1.7.0
	lvgl/lvgl@^8.3.9
	TAMC_GT911 @ ^1.0.2

[board_tas]
extends = board_lilygo
build_flags = 
	${board_lilygo.build_flags}
	-DTAS_CUSTOM_BOARD

# ============================================================
#  LCD 유닛 정의 섹션 (LCD Definitions)
# ============================================================
[lcd1]
build_flags = 
	-DLCD_TYPE_ST7789
	-DST7789_DRIVER
	-DUSER_SETUP_LOADED
	-DTFT_WIDTH=240
	-DTFT_HEIGHT=320
	-DTFT_MOSI=3
	-DTFT_SCLK=2
	-DTFT_CS=4
	-DTFT_DC=8
	-DTFT_RST=15
	-DTFT_BL=16
	-DTFT_BACKLIGHT_ON=HIGH
	-DSPI_FREQUENCY=80000000
	-DTFT_RGB_ORDER=TFT_BGR
	-DLV_COLOR_16_SWAP=1
	-DLV_TICK_CUSTOM=1
	-DLV_USE_PERF_MONITOR=1
	-DLV_DISP_DEF_REFR_PERIOD=16
	-DLV_CONF_INCLUDE_SIMPLE
	-DENABLE_TOUCH
	-DTOUCH_SDA=17
	-DTOUCH_SCL=18
	-DTOUCH_INT=21
	-DTOUCH_RST=38

[lcd2]
build_flags = 
	-DLCD_TYPE_ILI9341
	-DILI9341_DRIVER
	-DUSER_SETUP_LOADED
	-DTFT_WIDTH=240
	-DTFT_HEIGHT=320
	-DTFT_MOSI=3
	-DTFT_SCLK=2
	-DTFT_CS=4
	-DTFT_DC=8
	-DTFT_RST=15
	-DTFT_BL=16
	-DTFT_BACKLIGHT_ON=HIGH
	-DSPI_FREQUENCY=80000000
	-DTOUCH_CS=38
	-DTOUCH_IRQ=21
	-DLV_COLOR_16_SWAP=1
	-DLV_TICK_CUSTOM=1
	-DLV_USE_PERF_MONITOR=1
	-DLV_DISP_DEF_REFR_PERIOD=16
	-DLV_CONF_INCLUDE_SIMPLE

[lcd3]
build_flags = 
	-DLCD_TYPE_ILI9341
	-DILI9341_DRIVER
	-DTFT_PARALLEL_16_BIT
	-DUSER_SETUP_LOADED
	-DTFT_WIDTH=240
	-DTFT_HEIGHT=320
	-DTFT_WR=17
	-DTFT_RD=4
	-DTFT_DC=9
	-DTFT_CS=46
	-DTFT_RST=3
	-DTFT_D0=10   ; LCD D1
	-DTFT_D1=11   ; LCD D2
	-DTFT_D2=12   ; LCD D3
	-DTFT_D3=13   ; LCD D4
	-DTFT_D4=14   ; LCD D5
	-DTFT_D5=21   ; LCD D6
	-DTFT_D6=8    ; LCD D7
	-DTFT_D7=18   ; LCD D8
	-DTFT_D8=45   ; LCD D10
	-DTFT_D9=38   ; LCD D11
	-DTFT_D10=39  ; LCD D12
	-DTFT_D11=40  ; LCD D13
	-DTFT_D12=41  ; LCD D14
	-DTFT_D13=42  ; LCD D15
	-DTFT_D14=2    ; LCD D16
	-DTFT_D15=1    ; LCD D17
	-DTFT_BL=-1
	-DLV_COLOR_16_SWAP=1
	-DLV_TICK_CUSTOM=1
	-DLV_USE_PERF_MONITOR=1
	-DLV_DISP_DEF_REFR_PERIOD=16
	-DLV_CONF_INCLUDE_SIMPLE

# ============================================================
#  최종 통합 환경 (Combined Environments)
# ============================================================

# --- LilyGO 기반 ---
[env:lilygo-lcd1]
extends = board_lilygo
build_flags = ${env.build_flags} ${board_lilygo.build_flags} ${lcd1.build_flags}

[env:lilygo-lcd2]
extends = board_lilygo
build_flags = ${env.build_flags} ${board_lilygo.build_flags} ${lcd2.build_flags}
lib_deps = 
	${board_lilygo.lib_deps}
	https://github.com/PaulStoffregen/XPT2046_Touchscreen.git

[env:lilygo-lcd3]
extends = board_lilygo
build_flags = ${env.build_flags} ${board_lilygo.build_flags} ${lcd3.build_flags}

# --- EVB 기반 ---
[env:evb-lcd1]
extends = board_evb
build_flags = ${env.build_flags} ${board_evb.build_flags} ${lcd1.build_flags}

[env:evb-lcd2]
extends = board_evb
build_flags = ${env.build_flags} ${board_evb.build_flags} ${lcd2.build_flags}
lib_deps = 
	${board_evb.lib_deps}
	https://github.com/PaulStoffregen/XPT2046_Touchscreen.git

[env:evb-lcd3]
extends = board_evb
build_flags = ${env.build_flags} ${board_evb.build_flags} ${lcd3.build_flags} -DUSE_LOVYANGFX
lib_deps = 
	${board_evb.lib_deps}
	lovyan03/LovyanGFX@^1.1.12

# --- TAS 기반 ---
[env:tas-lcd1]
extends = board_tas
build_flags = ${env.build_flags} ${board_tas.build_flags} ${lcd1.build_flags}

[env:tas-lcd2]
extends = board_tas
build_flags = ${env.build_flags} ${board_tas.build_flags} ${lcd2.build_flags}
lib_deps = 
	${board_tas.lib_deps}
	https://github.com/PaulStoffregen/XPT2046_Touchscreen.git

[env:tas-lcd3]
extends = board_tas
build_flags = ${env.build_flags} ${board_tas.build_flags} ${lcd3.build_flags}
